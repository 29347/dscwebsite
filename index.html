<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PCC Data Science Club</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
      :root {
        --primary: #8b5cf6;
        --secondary: #d946ef;
        --accent: #06b6d4;
        --dark: #0f172a;
      }

      body {
        font-family: 'Plus Jakarta Sans', sans-serif;
        scroll-behavior: smooth;
        background-color: var(--dark);
        color: white;
        overflow-x: hidden;
      }

      .bg-animate {
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        z-index: -1;
        overflow: hidden;
        background: radial-gradient(circle at 50% 50%, #1e1b4b 0%, #0f172a 100%);
      }

      .blob {
        position: absolute;
        width: 500px; height: 500px;
        background: linear-gradient(135deg, var(--primary), var(--secondary));
        filter: blur(80px);
        border-radius: 50%;
        opacity: 0.15;
        animation: move 25s infinite alternate;
      }

      .blob-2 {
        background: var(--accent);
        width: 400px; height: 400px;
        left: 10%; top: 20%;
        animation-duration: 30s;
        animation-delay: -5s;
      }

      .blob-3 {
        background: #f43f5e;
        width: 300px; height: 300px;
        right: 15%; bottom: 10%;
        animation-duration: 20s;
        animation-delay: -2s;
      }

      @keyframes move {
        from { transform: translate(-10%, -10%) rotate(0deg); }
        to   { transform: translate(20%, 20%) rotate(360deg); }
      }

      .glass-nav {
        background: rgba(15, 23, 42, 0.7);
        backdrop-filter: blur(15px);
        -webkit-backdrop-filter: blur(15px);
        border-bottom: 1px solid rgba(255,255,255,0.1);
      }

      .glass-card {
        background: rgba(255,255,255,0.03);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255,255,255,0.08);
        transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      }

      .glass-card:hover {
        background: rgba(255,255,255,0.07);
        transform: translateY(-10px) scale(1.02);
        border-color: var(--primary);
        box-shadow: 0 20px 40px rgba(0,0,0,0.4);
      }

      .gradient-text {
        background: linear-gradient(to right, #a78bfa, #f472b6, #22d3ee);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-size: 200% auto;
        animation: shine 5s linear infinite;
      }

      @keyframes shine {
        to { background-position: 200% center; }
      }

      .btn-primary {
        background: linear-gradient(135deg, var(--primary), var(--secondary));
        transition: all 0.3s ease;
      }

      .btn-primary:hover {
        filter: brightness(1.2);
        box-shadow: 0 0 20px rgba(139,92,246,0.5);
        transform: translateY(-2px);
      }

      .code-window {
        background: #0d1117;
        border: 1px solid #30363d;
        box-shadow: 0 30px 60px rgba(0,0,0,0.5);
      }
    </style>
    <script type="module" crossorigin src="/assets/index-DABXH4qz.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-3yEGi_Su.css">
  </head>
  <body class="antialiased">
    <div class="bg-animate">
      <div class="blob"></div>
      <div class="blob blob-2"></div>
      <div class="blob blob-3"></div>
    </div>
    <div id="root"></div>
  </body>
</html>
